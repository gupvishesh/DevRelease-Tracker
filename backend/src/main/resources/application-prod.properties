# Production overrides — all values injected via Railway environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Allow Railway frontend URL (set FRONTEND_URL env var in Railway)
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:80}
